<!DOCTYPE html>
<html lang="en">
  <head>
    
    <title>CatPhotoApp by Porshia</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <main>
      <h1>CatPhotoApp</h1>
      <section>
        <h2>Cat Photos</h2>
        <p>Everyone loves <a href="https://cdn.freecodecamp.org/curriculum/cat-photo-app/running-cats.jpg">cute cats</a> online!</p>
        <p>See more <a target="_blank" href="https://freecatphotoapp.com">cat photos</a> in our gallery.</p>
        <a href="https://freecatphotoapp.com">
          <img id="mycat" src="img/8EC5411C-F8D1-43CB-B896-836E4FF3AE8D.JPG" alt="Black cat looking fancy with red rose pin"></a>
      </section>
      <section>
        <h2>Cat Lists</h2>
        <h3>Things cats love:</h3>
        <ul>
          <li>Catnip</li>
          <li>Cuttlery</li>
          <li>Chaos</li>
        </ul>
        <figure>
          <img id="kittychaos" src="img/ -2.jpeg" alt="black cat indifferent to the chaos behind them">
          <figcaption>Cats <em>love</em> chaos.</figcaption>  
        </figure>
        <h3>Top 3 things cats hate:</h3>
        <ol>
          <li>Closed doors</li>
          <li>Unavailable laps</li>
          <li>Food not being on time</li>
        </ol>
        <figure>
          <img id="mycat2" src="img/IMG_4583.jpeg" alt="Black cat stretched on a green blanket in a sunny living room.">
          <figcaption>Cats <strong>hate</strong> available laps</figcaption>  
        </figure>
      </section>
    </main>
    <footer>
      <p>
        No Copyright - <a href="https://www.freecodecamp.org">freeCodeCamp.org</a>
      </p>
    </footer>
  </body>
</html>
